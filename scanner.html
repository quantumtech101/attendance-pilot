<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Attendance Scanner</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; }
    .topbar { display:flex; justify-content:space-between; align-items:center; padding:12px; background:#f6f6f6; }
    .topbar a { margin-left:10px; text-decoration:none; color:#007bff; }
    .tabs { padding:12px; }
    .tabs button { margin-right:8px; padding:8px 12px; cursor:pointer; }

    #qr-reader, #barcode-reader { width:100%; max-width:480px; margin:12px auto; }
    #status { margin:12px; font-weight:600; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999999;
    }

    .modal-card {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      width: 320px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }

    #successMsg {
      margin-bottom: 12px;
      font-weight: bold;
      white-space: pre-line;
    }

    #scanOkBtn {
      padding: 8px 16px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    input#qrInput { padding:8px; width:200px; margin-right:8px; }
  </style>
</head>

<body>
  <div class="container">
    <div class="topbar">
      <h2>Attendance Scanner</h2>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="students.html">Students</a>
      </div>
    </div>

  <div class="page-card">
    <h3 class="section-title">Scan Attendance</h3>
    <p class="subtitle">Use QR, barcode, or manual entry to record attendance instantly.</p>
    <div class="tabs">
      <button onclick="showTab('qr')">QR Code</button>
      <button onclick="showTab('barcode')">Barcode</button>
      <button onclick="showTab('type')">Manual</button>
    </div>

    <div id="qrTab">
      <div id="qr-reader"></div>
      <div style="margin-top:8px; text-align:center;">
        <button id="startScanBtn">Start Scan</button>
      </div>
    </div>

    <div id="barcodeTab" style="display:none;">
      <div id="barcode-reader"></div>
    </div>

    <div id="typeTab" style="display:none;">
      <input id="qrInput" placeholder="Enter ID" onkeydown="if(event.key==='Enter') handleManualSubmit()">
      <button onclick="handleManualSubmit()">Submit</button>
    </div>
  </div>

  <div id="status" class="status-banner">Loading...</div>

  <script type="module" src="scanner.js"></script>
</body>
</html>
